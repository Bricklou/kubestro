# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: "Getting started"
    cmds:
      - task: install

  install:
    desc: "Install dependencies"
    cmds:
      - go mod download
      - go install github.com/air-verse/air@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install github.com/swaggo/swag/cmd/swag@latest

  dev:
    desc: "Start development server"
    cmd: KUBECONFIG=~/.kube/config air {{.CLI_ARGS}}
    env:
      CGO_ENABLED: "0"

  lint:
    desc: "Run linter"
    cmd: golangci-lint run ./...

  build:
    desc: "Build binary"
    cmd: go build -o ./bin/{{APP_NAME}} ./cmd/http/main.go
    requires:
      vars:
        - APP_NAME

  swag:
    desc: "Generate swagger documentation"
    cmds:
      - swag fmt
      - swag init -g ./cmd/http/main.go -o ./docs --parseInternal true

  start:
    desc: "Start binary"
    cmd: KUBECONFIG=~/.kube/config ./bin/{{APP_NAME}}
    requires:
      vars:
        - APP_NAME

  test:
    desc: "Run tests"
    cmds:
      - go test -v ./... -race -cover -timeout 30s -count 1 -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html

  fmt:
    desc: Format files
    cmd: go fmt ./...
