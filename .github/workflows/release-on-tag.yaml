name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2
      - name: Set Release Image
        run: cd config/default && kustomize edit set image ghcr.io/bricklou/kubestro-operator:${GITHUB_REF_NAME}
        working-directory: operator
      - name: Build Kubernetes YAML
        run: kustomize build config/default > operator.yaml
        working-directory: operator
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LICENSE
            operator/operator.yaml